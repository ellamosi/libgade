name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Alire
        uses: alire-project/setup-alire@v5

      - name: Cache Alire dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/alire
            ~/.config/alire
            ~/.local/share/alire
          key: ${{ runner.os }}-alire-${{ hashFiles('alire.toml', 'alire/alire.lock', 'tests/alire.toml', 'tests/alire/alire.lock') }}
          restore-keys: |
            ${{ runner.os }}-alire-

      - name: Build with Alire
        run: alr build

      - name: Build C++ interface library
        run: alr exec -- gprbuild -j0 -p -q -P gade_cpp.gpr

      - name: Build C++ smoke test
        run: alr exec -- gprbuild -j0 -p -q -P tests/interfaces/cpp/gade_cpp_smoke.gpr

      - name: Build tests with Alire
        working-directory: tests
        run: ./bootstrap.sh

      - name: Run tests
        working-directory: tests
        run: alr exec -- python3 run.py
