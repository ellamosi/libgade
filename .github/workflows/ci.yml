name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Alire
        uses: alire-project/setup-alire@v5

      - name: Cache Alire dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/alire
            ~/.config/alire
            ~/.local/share/alire
          key: ${{ runner.os }}-alire-${{ hashFiles('alire.toml', 'alire/alire.lock', 'tests/alire.toml', 'tests/alire/alire.lock') }}
          restore-keys: |
            ${{ runner.os }}-alire-

      - name: Cache ROM downloads
        uses: actions/cache@v4
        with:
          path: tests/.rom-cache/downloads
          key: ${{ runner.os }}-rom-downloads-${{ hashFiles('tests/assets/roms_manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-rom-downloads-

      - name: Build with Alire
        run: alr build

      - name: Build C++ interface library
        run: alr exec -- gprbuild -j0 -p -q -P gade_cpp.gpr

      - name: Build C++ interface check
        run: alr exec -- gprbuild -j0 -p -q -P tests/interfaces/cpp/gade_cpp_interface_check.gpr

      - name: Build tests with Alire
        working-directory: tests
        run: alr build

      - name: Run tests
        working-directory: tests
        run: alr run --skip-build
        env:
          GADE_ROM_STRICT: "1"
          GADE_COMMERCIAL_ROMS_URL: ${{ secrets.GADE_COMMERCIAL_ROMS_URL }}
          GADE_COMMERCIAL_ROMS_PASSWORD: ${{ secrets.GADE_COMMERCIAL_ROMS_PASSWORD }}

  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Alire
        uses: alire-project/setup-alire@v5

      - name: Install LCOV
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Cache Alire dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/alire
            ~/.config/alire
            ~/.local/share/alire
          key: ${{ runner.os }}-alire-${{ hashFiles('alire.toml', 'alire/alire.lock', 'tests/alire.toml', 'tests/alire/alire.lock') }}
          restore-keys: |
            ${{ runner.os }}-alire-

      - name: Cache ROM downloads
        uses: actions/cache@v4
        with:
          path: tests/.rom-cache/downloads
          key: ${{ runner.os }}-rom-downloads-${{ hashFiles('tests/assets/roms_manifest.toml') }}
          restore-keys: |
            ${{ runner.os }}-rom-downloads-

      - name: Build with coverage instrumentation
        run: alr build
        env:
          GADE_COVERAGE: "true"

      - name: Build tests with coverage instrumentation
        working-directory: tests
        run: alr build
        env:
          GADE_COVERAGE: "true"

      - name: Run tests (coverage)
        working-directory: tests
        run: alr run --skip-build
        env:
          GADE_COVERAGE: "true"
          GADE_ROM_STRICT: "1"
          GADE_COMMERCIAL_ROMS_URL: ${{ secrets.GADE_COMMERCIAL_ROMS_URL }}
          GADE_COMMERCIAL_ROMS_PASSWORD: ${{ secrets.GADE_COMMERCIAL_ROMS_PASSWORD }}

      - name: Generate LCOV report
        run: |
          mkdir -p coverage
          GCOV_TOOL="$(alr exec -- sh -lc 'command -v gcov')"
          lcov --gcov-tool "${GCOV_TOOL}" --capture --directory . --output-file coverage/lcov.info
          lcov --remove coverage/lcov.info \
            '/usr/*' \
            '/opt/*' \
            "${HOME}/.cache/*" \
            "${HOME}/.config/*" \
            "${HOME}/.local/share/alire/*" \
            '*/alire/*' \
            --ignore-errors empty,unused \
            --output-file coverage/lcov.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info
          format: lcov
          flag-name: ada-core
