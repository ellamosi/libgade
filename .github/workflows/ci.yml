name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Alire
        uses: alire-project/setup-alire@v5

      - name: Build with Alire
        run: alr build

      - name: Build testsuite with Alire
        working-directory: testsuite
        run: alr build

      - name: Run testsuite
        working-directory: testsuite
        run: alr exec -- python3 run.py
