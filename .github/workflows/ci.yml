name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Alire
        uses: alire-project/setup-alire@v5

      - name: Cache Alire dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/alire
            ~/.config/alire
            ~/.local/share/alire
          key: ${{ runner.os }}-alire-${{ hashFiles('alire.toml', 'alire/alire.lock', 'testsuite/alire.toml', 'testsuite/alire/alire.lock') }}
          restore-keys: |
            ${{ runner.os }}-alire-

      - name: Build with Alire
        run: alr build

      - name: Build C++ interface library
        run: alr exec -- gprbuild -j0 -p -q -P libgade_cpp.gpr

      - name: Build C++ smoke test
        run: alr exec -- gprbuild -j0 -p -q -P cpp/tests/libgade_cpp_smoke.gpr

      - name: Build testsuite with Alire
        working-directory: testsuite
        run: ./bootstrap.sh

      - name: Run testsuite
        working-directory: testsuite
        run: alr exec -- python3 run.py
