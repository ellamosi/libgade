name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  TOOLS_DIR: ${{ github.workspace }}/build_tools
  GNAT_PACKAGE: gnat-community-2019-20190517-x86_64-linux-bin

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache GNAT toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLS_DIR }}
          key: ${{ runner.os }}-${{ env.GNAT_PACKAGE }}

      - name: Install GNAT Community 2019
        run: |
          set -eu
          mkdir -p "$TOOLS_DIR"
          GNAT_BIN_PATH="$TOOLS_DIR/$GNAT_PACKAGE"

          if [ ! -f "$GNAT_BIN_PATH" ]; then
            wget "https://community.download.adacore.com/v1/0cd3e2a668332613b522d9612ffa27ef3eb0815b?filename=$GNAT_PACKAGE" -O "$GNAT_BIN_PATH"
          fi

          if [ ! -d "$TOOLS_DIR/native" ]; then
            wget https://raw.githubusercontent.com/AdaCore/gnat_community_install_script/master/install_package.sh
            wget https://raw.githubusercontent.com/AdaCore/gnat_community_install_script/master/install_script.qs
            sh install_package.sh "$GNAT_BIN_PATH" "$TOOLS_DIR/native/"
          fi

          echo "$TOOLS_DIR/native/bin" >> "$GITHUB_PATH"

      - name: Show gprbuild version
        run: gprbuild --version

      - name: Run testsuite
        run: python3 testsuite/run.py
