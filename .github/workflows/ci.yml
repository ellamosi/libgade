name: CI

env:
  CI_TOOLS_BUNDLE_TAG: ci-tools-bundle-v1
  CI_TOOLS_BUNDLE_ASSET: ci-tools-ubuntu.tar.zst

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  define-test-shards:
    runs-on: ubuntu-latest
    name: Define Test Shards
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Load test shard matrix
        id: matrix
        run: python3 scripts/ci_shards.py matrix --github-output "${GITHUB_OUTPUT}"

  format:
    runs-on: ubuntu-latest
    name: Check Format
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shared CI setup
        uses: ./.github/actions/ci-setup
        with:
          cache-rom-downloads: "false"

      - name: Ensure gnatformat
        shell: sh
        run: |
          if [ ! -x "${HOME}/.alire/bin/gnatformat" ]; then
            alr install gnatformat
          fi

      - name: Check Ada formatting
        run: ./scripts/check-ada-format.sh

  cpp-interface:
    runs-on: ubuntu-latest
    name: Cpp Interface

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shared CI setup
        uses: ./.github/actions/ci-setup
        with:
          cache-rom-downloads: "false"

      - name: Build library
        run: alr build

      - name: Build C++ interface library
        run: alr exec -- gprbuild -j0 -p -q -P gade_cpp.gpr

      - name: Build C++ interface check
        run: alr exec -- gprbuild -j0 -p -q -P tests/interfaces/cpp/gade_cpp_interface_check.gpr

  test_shards:
    runs-on: ubuntu-latest
    needs: define-test-shards
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.define-test-shards.outputs.matrix) }}

    name: Tests / Shard ${{ matrix.index }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Shared CI setup
        uses: ./.github/actions/ci-setup

      - name: Build tests
        working-directory: tests
        run: alr build

      - name: Write shard nodeids
        run: |
          python3 scripts/ci_shards.py nodeids \
            --shard "${{ matrix.index }}" \
            --output "${RUNNER_TEMP}/pytest-nodeids.txt"

      - name: Run shard tests
        working-directory: tests
        # --skip-build avoids rebuilding run-tests; --no-build prevents pytest
        # fixtures from rebuilding gade-testd with potentially different flags.
        run: |
          python3 run.py \
            --no-build \
            --nodeids-file "${RUNNER_TEMP}/pytest-nodeids.txt" \
            --junitxml "${RUNNER_TEMP}/pytest-shard-${{ matrix.index }}.xml"
        env:
          GADE_ROM_STRICT: "1"
          GADE_COMMERCIAL_ROMS_URL: ${{ secrets.GADE_COMMERCIAL_ROMS_URL }}
          GADE_COMMERCIAL_ROMS_PASSWORD: ${{ secrets.GADE_COMMERCIAL_ROMS_PASSWORD }}

      - name: Upload shard JUnit XML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-shard-${{ matrix.index }}
          path: ${{ runner.temp }}/pytest-shard-${{ matrix.index }}.xml
          if-no-files-found: ignore

  tests:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: test_shards
    name: Tests

    steps:
      - name: Check shard results
        run: test "${{ needs.test_shards.result }}" = "success"

  coverage_run:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    name: Coverage / Full

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Shared CI setup
        uses: ./.github/actions/ci-setup

      - name: Ensure LCOV
        shell: sh
        run: |
          if ! command -v lcov >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y lcov
          fi

      - name: Build library (coverage)
        run: alr build
        env:
          GADE_COVERAGE: "true"

      - name: Build tests (coverage)
        working-directory: tests
        run: alr build
        env:
          GADE_COVERAGE: "true"

      - name: Run tests (coverage)
        working-directory: tests
        # Keep test execution on binaries built in this job (coverage flags).
        run: alr run --skip-build --args="--no-build"
        env:
          GADE_ROM_STRICT: "1"
          GADE_COMMERCIAL_ROMS_URL: ${{ secrets.GADE_COMMERCIAL_ROMS_URL }}
          GADE_COMMERCIAL_ROMS_PASSWORD: ${{ secrets.GADE_COMMERCIAL_ROMS_PASSWORD }}

      - name: Generate LCOV report
        run: |
          mkdir -p coverage
          GCOV_TOOL="$(alr exec -- sh -lc 'command -v gcov')"
          # GNAT/GCC can report line hits while some internal blocks remain
          # "unexecuted". Keep line-level coverage stable in CI logs; revisit
          # this if we ever switch to branch/block coverage enforcement.
          lcov --gcov-tool "${GCOV_TOOL}" --rc geninfo_unexecuted_blocks=1 --capture --directory . --output-file coverage/lcov.info
          lcov --remove coverage/lcov.info \
            '*/b__*.adb' \
            '*/tests/harness/*' \
            '*/tests/obj/*' \
            --ignore-errors empty,unused \
            --output-file coverage/lcov.info

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage/lcov.info
          format: lcov
          flag-name: ada-core

  coverage:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: coverage_run
    name: Coverage

    steps:
      - name: Coverage disabled on pull requests
        if: ${{ github.event_name == 'pull_request' }}
        run: echo "Coverage runs on push to main/master only."

      - name: Check coverage job result
        if: ${{ github.event_name == 'push' }}
        run: test "${{ needs.coverage_run.result }}" = "success"
