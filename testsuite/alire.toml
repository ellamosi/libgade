name = "libgade_testd"
description = "Integration testsuite for libgade"
version = "0.1.0-dev"

authors = ["ellamosi"]
maintainers = ["ellamosi <ellamosi@users.noreply.github.com>"]
maintainers-logins = ["ellamosi"]
licenses = "MIT"
website = "https://github.com/ellamosi/libgade"
tags = ["ada", "gameboy", "emulator", "testsuite"]

project-files = ["harness/gade_testd.gpr"]

[gpr-externals]
mode = ["debug", "release"]
GADE_LIBRARY_TYPE = ["relocatable", "static", "static-pic"]

[gpr-set-externals]
mode = "debug"
GADE_LIBRARY_TYPE = "static"

[[depends-on]]
gade = "*"

[[depends-on]]
image_io = "^20240725.0.0"

[[pins]]
gade = { path = ".." }
